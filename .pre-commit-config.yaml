repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '__snapshots__/'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.10.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Security: Bandit (Python SAST)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ['-c', 'bridge/.bandit.yaml', '-r']
        files: ^bridge/
        exclude: ^bridge/tests/

  # Security: trufflehog (secrets scanner, pre-commit)
  # Scans staged diffs for leaked secrets before each commit.
  # Requires trufflehog v3 binary installed (Go binary from GitHub Releases).
  # Install: see docs/SECURITY_TRUFFLEHOG.md
  # STATUS: ACTIVE (requires trufflehog binary in PATH)
  # NOTE: Entry includes version guard. If only trufflehog v2 (pip) is found,
  #   the hook prints a warning and exits 0 (skip). v3 runs the real scan.
  #   To install v3: https://github.com/trufflesecurity/trufflehog#installation
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog (secret scan)
        entry: bash -c 'if ! command -v trufflehog &>/dev/null; then echo "[trufflehog] not found, skipping (install v3 for active scanning)"; exit 0; fi; v=$(trufflehog --version 2>&1 | head -1); if echo "$v" | grep -qE "^trufflehog 3|^3\.|trufflehog v3"; then trufflehog git file://. --since-commit HEAD --only-verified --fail --no-update; else echo "[trufflehog] $v detected (need v3), skipping hook"; exit 0; fi'
        language: system
        stages: [pre-commit]
        pass_filenames: false

  # Security: gitleaks (secrets scanner)
  # STATUS: Disabled (as of 2026-05-14).
  # REASON: gitleaks pre-commit mirror uses wasm-based go-re2 which crashes on
  #   Windows with panic: "wasm error: invalid table access".
  #   Tracking: https://github.com/gitleaks/gitleaks/issues
  # MANUAL USAGE (recommended before every release):
  #   1. Install: `scoop install gitleaks` or `winget install gitleaks`
  #   2. Scan current tree: `gitleaks detect --source . --config .gitleaks.toml`
  #   3. Scan git history: `gitleaks detect --source . --config .gitleaks.toml --log-opts="--all"`
  # REACTIVATION: When the upstream bug is fixed, uncomment the following:
  # - repo: https://github.com/gitleaks/gitleaks
  #   rev: v8.22.1
  #   hooks:
  #     - id: gitleaks

  - repo: local
    hooks:
      - id: en-only-production
        name: English-only in production code (EN-only policy)
        entry: python scripts/check_en_only_production.py
        language: python
        files: ^(bridge/(application|domain|infrastructure|presentation)/|bridge/main\.py$|scripts/|\.pre-commit-config\.yaml$|start-bot\.bat$)
        pass_filenames: true

      - id: no-fake-umlauts
        name: No ASCII umlauts (ae/oe/ue/ss) in German production text
        entry: python scripts/check_no_fake_umlauts.py
        language: python
        files: ^bridge/(application|domain|infrastructure|presentation|config)/.*\.(py|ya?ml)$
        exclude: ^bridge/tests/

      - id: i18n-check
        name: i18n key parity and hash check
        entry: python scripts/i18n_check.py
        language: python
        files: ^bridge/i18n/locales/.*\.json$
        pass_filenames: false

      - id: i18n-scan
        name: i18n hardcoded string scanner
        entry: python scripts/i18n_scan.py
        language: python
        files: ^bridge/(presentation|application)/.*\.py$
        pass_filenames: false

      - id: import-linter
        name: import-linter
        entry: python scripts/run_with_venv.py lint-imports
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: python scripts/run_with_venv.py pytest -q --no-header
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Security: pip-audit (dependency vulnerability scanner)
      # Uses scripts/run_with_venv.py for platform-portable venv access.
      # --ignore-vuln PYSEC-2025-183: CVE-2025-45768 "weak encryption" in
      #   pyjwt <=2.12.1. Disputed by maintainer (key length is app's choice).
      #   Transitive dep only (mcp -> pyjwt); we never call pyjwt directly.
      #   No fix release exists as of 2026-05-20. Remove once pyjwt ships a
      #   patched version.
      - id: pip-audit
        name: pip-audit
        entry: python scripts/run_with_venv.py pip_audit --ignore-vuln PYSEC-2025-183
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-coverage-report
        name: Generate test coverage report
        entry: python scripts/pytest_coverage.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [manual]  # Manual only, not on every commit

      # Security: semgrep (SAST with 2000+ rules, on changed files only)
      # Uses scripts/run_with_venv.py for platform-portable venv access.
      - id: semgrep
        name: semgrep
        entry: python scripts/run_with_venv.py semgrep --config=auto --quiet --error --exclude=test_main_wiring_generalized.py
        language: system
        pass_filenames: false
        files: ^bridge/.*\.py$
        types: [python]
        stages: [pre-commit]

      # AXOLENT-specific semgrep rules (custom patterns)
      # --severity=ERROR: only ERROR-level findings block the commit.
      # WARNING-level (e.g. TODO/FIXME markers) are reported but pass.
      - id: semgrep-axolent
        name: semgrep (axolent rules)
        entry: python scripts/run_with_venv.py semgrep --config=../.semgrep/axolent-rules.yml --quiet --error --severity=ERROR .
        language: system
        pass_filenames: false
        files: ^bridge/.*\.py$
        types: [python]
        stages: [pre-commit]
