repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.10.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Security: Bandit (Python SAST)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ['-c', 'bridge/.bandit.yaml', '-r']
        files: ^bridge/
        exclude: ^bridge/tests/

  # Security: gitleaks (Secrets scanner)
  # HINWEIS: gitleaks pre-commit mirror nutzt wasm-basierte go-re2 die auf
  # Windows mit panic: "wasm error: invalid table access" crasht.
  # Workaround: gitleaks manuell ausführen bis Upstream-Fix verfügbar.
  # Tracking: https://github.com/gitleaks/gitleaks/issues
  # - repo: https://github.com/gitleaks/gitleaks
  #   rev: v8.22.1
  #   hooks:
  #     - id: gitleaks

  - repo: local
    hooks:
      - id: import-linter
        name: import-linter
        entry: python scripts/run_with_venv.py lint-imports
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: python scripts/run_with_venv.py pytest -q --no-header
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Security: pip-audit (Dependency vulnerability scanner)
      # Nutzt scripts/run_with_venv.py für plattform-portablen venv-Zugriff.
      - id: pip-audit
        name: pip-audit
        entry: python scripts/run_with_venv.py pip_audit
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Security: semgrep (SAST with 2000+ rules, on changed files only)
      # Nutzt scripts/run_with_venv.py für plattform-portablen venv-Zugriff.
      - id: semgrep
        name: semgrep
        entry: python scripts/run_with_venv.py semgrep --config=auto --quiet --error
        language: system
        pass_filenames: false
        files: ^bridge/.*\.py$
        types: [python]
        stages: [pre-commit]
