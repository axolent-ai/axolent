title = "Axolent Gitleaks Config"

[extend]
useDefault = true

# Custom rules for Telegram Bot Tokens
[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot Token"
regex = '''(?i)\b\d{8,10}:[A-Za-z0-9_-]{35}\b'''
keywords = ["telegram", "bot", "token"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[A-Za-z0-9_-]{20,}'''
keywords = ["anthropic", "claude", "sk-ant"]

[allowlist]
description = "Known safe paths and false-positive patterns"
paths = [
    '''.venv/''',
    '''venv/''',
    '''node_modules/''',
    '''\.egg-info/''',
    '''desktop/''',
    '''mini-app/''',
    # R7-MED-01: Narrowed from blanket bridge/tests/.* to specific files
    # that contain intentional dummy credentials for privacy-filter /
    # security testing. Convention: test fixtures use DUMMY_ / EXAMPLE_ /
    # TEST_ / REDACTED_ prefixes for fake secrets.
    '''bridge/tests/test_application/test_contracts/test_pipeline_contracts\.py''',
    '''bridge/tests/test_application/test_skill_compression/test_privacy_pipeline\.py''',
    '''bridge/tests/test_application/test_skill_compression/test_privacy_secrets\.py''',
    '''bridge/tests/test_application/test_skill_compression/test_skill_commands\.py''',
    '''bridge/tests/test_scripts/test_check_public_boundary\.py''',
    '''bridge/tests/test_security/conftest\.py''',
    '''bridge/tests/test_security/test_llm_output_properties\.py''',
    '''bridge/tests/test_security/test_owasp_llm06_sensitive_disclosure\.py''',
    '''bridge/tests/test_security/test_stride_medium_low_gaps\.py''',
    '''bridge/tests/test_adversarial/test_K6_privacy_bypass\.py''',
    # Semgrep rules describe secret patterns by design
    '''.semgrep/.*''',
    # Scanner script itself contains detection patterns
    '''scripts/check_public_boundary\.py''',
    # Config with patterns for boundary checks
    '''scripts/public_boundary\.yaml''',
    # License-check script contains license-like strings
    '''scripts/check_license_compliance\.py''',
    # SBOM docs may contain license-like strings
    '''docs/SBOM_.*\.md''',
    # E2E setup docs contain placeholder TELEGRAM_API_HASH=abcdef... examples
    '''docs/E2E_TELEGRAM_TESTS\.md''',
]

# Python kwargs like is_final=True falsely matched as generic-api-key;
# Placeholder/example credentials in docs and config.
regexes = [
    '''(is_final|is_active|is_admin|is_owner|is_default|is_complete)=(True|False)''',
    '''(REPLACE_ME|EXAMPLE|YOUR_TOKEN_HERE|YOUR_KEY_HERE|xxx|abc123|def456|test_token)''',
]
