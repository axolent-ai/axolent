        working-directory: ./bridge
        run: |
          mutmut run \
            --paths-to-mutate "main.py" \
            --tests-dir "tests/" \
            --runner "python -m pytest tests/test_infrastructure/test_sentry_integration.py tests/test_adversarial/test_K8_sentry_pii.py -x -q --tb=no" \
