      - name: Install dependencies
        working-directory: ./bridge
        run: |
          pip install -e ".[test]"
          pip install "mutmut<3"
      - name: Mutate stream_guard.py
        working-directory: ./bridge
        run: |
          mutmut run \
            --paths-to-mutate "application/language/stream_guard.py" \
            --tests-dir "tests/" \
            --runner "python -m pytest tests/test_application/test_language/test_stream_guard.py tests/test_application/test_language/test_stream_guard_hypothesis.py -x -q --tb=no" \
            || true
          mutmut results
        continue-on-error: true
      - name: Upload mutation cache
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: mutation-cache-stream-guard
          path: bridge/.mutmut-cache/

  mutate-sentry:
