name: Mutation Testing

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 06:00 UTC weekly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutate-language:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: ./bridge
        run: |
          pip install -e ".[test]"
          pip install "mutmut<3"
      - name: Mutate application/language/
        working-directory: ./bridge
        run: |
          mutmut run \
            --paths-to-mutate "application/language/" \
            --tests-dir "tests/" \
            --runner "python -m pytest tests/test_application/test_language/ -x -q --tb=no" \
            || true
          mutmut results
        continue-on-error: true
      - name: Upload mutation cache
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: mutation-cache-language
          path: bridge/.mutmut-cache/

  mutate-stream-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
