name: Daily Smoke Test

on:
  schedule:
    # Run every day at 03:00 UTC (04:00 CET / 05:00 CEST)
    - cron: '0 3 * * *'
  workflow_dispatch:  # manual trigger

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./bridge
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run smoke test
        working-directory: ./
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: |
          python scripts/smoke_test.py

      - name: Run full test suite
        working-directory: ./bridge
        run: |
          pytest --tb=short -q

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily smoke test failed. Check the logs above for details."
          echo "Daily smoke test failed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Future: post to Slack/Telegram via webhook
