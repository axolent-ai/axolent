name: Performance Budgets

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 UTC weekly
  workflow_dispatch:
  pull_request:
    paths:
      - 'bridge/domain/**'
      - 'bridge/application/**'
      - 'bridge/infrastructure/**'

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./bridge
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test,encryption,skill-compression]"

      - name: Run performance budget tests
        working-directory: ./bridge
        run: pytest tests/test_performance/ -v -m performance
        continue-on-error: true  # Performance is informational, not blocking

      - name: Report performance
        if: always()
        run: echo "Performance tests completed - see job log for budget violations"
