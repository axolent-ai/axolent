name: Performance Budgets

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 UTC weekly
  workflow_dispatch:
  pull_request:
    paths:
      - 'bridge/domain/**'
      - 'bridge/application/**'
      - 'bridge/infrastructure/**'

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./bridge
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test,encryption,skill-compression]"

      - name: Run performance budget tests
        working-directory: ./bridge
        run: pytest tests/test_performance/ -v -m performance
        continue-on-error: true  # Performance is informational, not blocking

      - name: Report performance
        if: always()
        run: echo "Performance tests completed - see job log for budget violations"
