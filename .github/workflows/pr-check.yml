name: PR Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./bridge
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"
          pip install ruff  # ruff is a standalone linter, not bundled in extras

      - name: Lint (ruff check)
        working-directory: ./bridge
        run: ruff check .

      - name: Lint (ruff format)
        working-directory: ./bridge
        run: ruff format --check .

      - name: Architecture (import-linter)
        working-directory: ./bridge
        run: lint-imports

      - name: Security (bandit)
        working-directory: ./bridge
        run: bandit -c .bandit.yaml -r .

      - name: Security (semgrep)
        working-directory: ./bridge
        run: semgrep --config=auto --error

      - name: Custom rules (semgrep axolent)
        run: semgrep --config=.semgrep/axolent-rules.yml --severity=ERROR --error bridge/

      - name: Test suite
        working-directory: ./bridge
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: pytest --tb=short -q

      - name: OWASP LLM Top 10 Security Tests
        working-directory: ./bridge
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: pytest tests/test_security/ -v -m security

      - name: Golden Corpus
        working-directory: ./bridge
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: pytest tests/test_corpus/ -v -m golden_corpus

      - name: Smoke test
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: python scripts/smoke_test.py
