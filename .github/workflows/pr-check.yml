name: PR Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./bridge
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Lint (ruff check)
        working-directory: ./bridge
        run: ruff check .

      - name: Lint (ruff format)
        working-directory: ./bridge
        run: ruff format --check .

      - name: Architecture (import-linter)
        working-directory: ./bridge
        run: lint-imports

      - name: Security (bandit)
        working-directory: ./bridge
        run: bandit -c .bandit.yaml -r .

      - name: Security (semgrep)
        working-directory: ./bridge
        run: semgrep --config=auto --error

      - name: Custom rules (semgrep axolent)
        run: semgrep --config=.semgrep/axolent-rules.yml --severity=ERROR --error bridge/

      - name: Test suite
        working-directory: ./bridge
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: pytest --tb=short -q

      - name: OWASP LLM Top 10 Security Tests
        working-directory: ./bridge
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: pytest tests/test_security/ -v -m security

      - name: Golden Corpus
        working-directory: ./bridge
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: pytest tests/test_corpus/ -v -m golden_corpus

      - name: Smoke test
        env:
          AXOLENT_TIMEZONE: Europe/Berlin
        run: python scripts/smoke_test.py
