name: Secret Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for git-history scan

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          extra_args: --only-verified

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
