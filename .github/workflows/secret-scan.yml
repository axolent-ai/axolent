name: Secret Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history needed for git-history scan
          persist-credentials: false

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3
        with:
          extra_args: --only-verified

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # gitleaks-action@v2 requires a paid license for org repos.
      # Use the CLI directly instead (free, same engine).
      - name: Install gitleaks (verified)
        env:
          GITLEAKS_VERSION: "8.24.3"
          # SHA256 from https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_checksums.txt
          GITLEAKS_SHA256: "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c
          tar -xz -C /usr/local/bin -f gitleaks.tar.gz gitleaks
          rm gitleaks.tar.gz

      - name: Gitleaks scan
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts="--all" --verbose
