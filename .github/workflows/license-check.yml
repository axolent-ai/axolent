name: License Compliance Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies + pip-licenses
        working-directory: ./bridge
        run: |
          pip install --upgrade pip
          # Skip 'encryption' extra: pysqlcipher3 requires libsqlcipher-dev
          # (C headers) unavailable on GitHub runners. Its license (BSD-3-Clause)
          # and keyring (MIT) are both AGPL-compatible and manually verified.
          pip install -e ".[dev,test,skill-compression]"
          pip install pip-licenses PyYAML

      - name: Run license compliance check
        run: python scripts/check_license_compliance.py
