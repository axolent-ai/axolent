name: Public Boundary Gate
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run boundary scanner
        run: python scripts/check_public_boundary.py
