# Jarvis-LITE Model Registry
# Stand: 2026-05-12, manuelle Pflege (Phase 2c wird das durch Scraping ersetzen)
#
# Schema:
#   id:                     Offizielle Modell-ID (API-Identifier)
#   display_name:           Menschenlesbarer Name für UI
#   provider:               Provider-Key (anthropic, openai, google, moonshot, ollama)
#   aliases:                Liste von Kurzbezeichnungen für User-Input
#   context_window:         Max. Tokens im Kontext
#   pricing_input_per_mtok: Kosten pro Million Input-Tokens (USD)
#   pricing_output_per_mtok: Kosten pro Million Output-Tokens (USD)
#   scores:                 Leistungswerte (0-100)
#     coding:               Code-Generierung und -Verständnis
#     reasoning:            Logisches Denken und Problemlösung
#     knowledge:            Allgemeinwissen und Faktentreue
#     speed:                Relative Geschwindigkeit (höher = schneller)
#   supports_thinking:      Extended Thinking / Chain-of-Thought nativ
#   supports_effort:        Effort/Budget-Parameter unterstützt
#   is_open_source:         Open-Source-Modell (Weights verfügbar)

