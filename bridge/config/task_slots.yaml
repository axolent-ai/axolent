# Task slot configuration for automatic model routing
# Each slot has: default_model, patterns, keywords, thresholds
#
# Score calculation:
#   - Each matched pattern: +3 points (strong signal)
#   - Each matched keyword: +1 point
#   - Code block (```): +100 points (direct CODE slot)
#
# On score tie, priority applies: CODE > REASON > RESEARCH > CREATIVE > QUICK > CHAT

slots:
  code:
    default_model: opus
    patterns:
      - "```"
      - "def "
      - "function "
      - "class "
      - "import "
      - "from "
      - "const "
      - "SELECT "
    keywords:
      # DE keywords (feature: German input classification)
      - debug
      - refactor
      - implementier
      - programmier
      - bug
      - fehler im code
      - syntax
      - traceback
      - exception
      - TypeError
      - ValueError
      - KeyError
      - IndexError
      - RuntimeError
      - SyntaxError
      - code review
      - pull request
      # EN keywords
      - implement
      - error
      - fix the code
      - write code
      - coding
      - compile
      - runtime error
      - stack trace
      - function
      - variable
      - algorithm
      - deploy
      - script
    min_keyword_matches: 2

  reason:
    default_model: opus
    keywords:
      # DE keywords
      - analysier
      - vergleich
      - pro und contra
      - schritt für schritt
      - berechn
      - kalkulier
      - strategie
      - hypothese
      - logisch
      - ableiten
      - schlussfolger
      - break even
      - marge
      - roi
      # EN keywords
      - step by step
      - analyze
      - compare
      - pros and cons
      - calculate
      - strategy
      - hypothesis
      - logical
      - derive
      - conclude
      - margin
      - tradeoff
      - evaluate
      - reasoning
    min_keyword_matches: 2
    min_word_count: 50

  research:
    default_model: opus
    keywords:
      # DE keywords
      - recherchier
      - zusammenfass
      - markt
      - wettbewerb
      - benchmark
      - trend
      - branche
      - umfassend
      - detailliert
      - quellen
      - studie
      # EN keywords
      - research
      - deep dive
      - summarize
      - market
      - competitor
      - industry
      - comprehensive
      - detailed
      - sources
      - study
      - survey
      - report
      - investigation
    patterns:
      - "http://"
      - "https://"
    min_keyword_matches: 2

  creative:
    default_model: sonnet
    keywords:
      # DE keywords
      - brainstorm
      - ideen
      - vorschläge
      - varianten
      - alternativen
      - schreib
      - formulier
      - verfass
      - headline
      - slogan
      - ad copy
      - email
      - blog
      - artikel
      - naming
      - produktname
      # EN keywords
      - ideas
      - suggestions
      - alternatives
      - write
      - compose
      - draft
      - tagline
      - article
      - product name
      - creative
      - story
      - poem
      - catchy
    min_keyword_matches: 2

  quick:
    default_model: haiku
    keywords:
      # DE keywords
      - klassifizier
      - kategorisier
      - extrahier
      - ist das
      - ja oder nein
      - übersetz
      - formatier
      - konvertier
      - übersetze
      # EN keywords
      - classify
      - categorize
      - extract
      - is this
      - yes or no
      - translate
      - format
      - convert
      - quick question
      - short answer
    min_keyword_matches: 1
    max_word_count: 50

  chat:
    default_model: sonnet
    fallback: true
