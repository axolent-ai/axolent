# French: accent and cedilla corrections
#
# Covers missing accents (acute, grave, circumflex, cedilla, trema)
# that LLMs frequently omit when generating French text.

language: fr

word_pairs:
  - ascii: "etre"
    correct: "être"
  - ascii: "etait"
    correct: "était"
  - ascii: "ete"
    correct: "été"
  - ascii: "etat"
    correct: "état"
  - ascii: "ecole"
    correct: "école"
  - ascii: "evenement"
    correct: "événement"
  - ascii: "francais"
    correct: "français"
  - ascii: "francaise"
    correct: "française"
  - ascii: "garcon"
    correct: "garçon"
  - ascii: "lecon"
    correct: "leçon"
  - ascii: "deja"
    correct: "déjà"
  - ascii: "voila"
    correct: "voilà"
  - ascii: "hopital"
    correct: "hôpital"
  - ascii: "hotel"
    correct: "hôtel"
  - ascii: "role"
    correct: "rôle"
  - ascii: "meme"
    correct: "même"
  - ascii: "noel"
    correct: "Noël"

loan_word_whitelist:
  - "age"
  - "cage"
  - "file"
  - "fine"
  - "male"
  - "note"
  - "page"
  - "role"
  - "route"
  - "rule"
  - "stage"
  - "table"
  - "module"
  - "node"
  - "code"
  - "mode"
  - "state"
