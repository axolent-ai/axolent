# Portuguese: tilde, cedilla, and accent corrections
#
# Covers missing tildes, cedillas, and accent marks that LLMs
# frequently omit when generating Portuguese text.

language: pt

word_pairs:
  # tilde
  - ascii: "nao"
    correct: "não"
  - ascii: "sao"
    correct: "são"
  - ascii: "entao"
    correct: "então"
  - ascii: "informacao"
    correct: "informação"
  - ascii: "situacao"
    correct: "situação"
  - ascii: "coracao"
    correct: "coração"
  - ascii: "mae"
    correct: "mãe"
  - ascii: "pao"
    correct: "pão"
  # cedilla
  - ascii: "voce"
    correct: "você"
  - ascii: "funcao"
    correct: "função"
  - ascii: "preco"
    correct: "preço"
  - ascii: "servico"
    correct: "serviço"
  # accents
  - ascii: "agua"
    correct: "água"
  - ascii: "tambem"
    correct: "também"
  - ascii: "facil"
    correct: "fácil"
  - ascii: "dificil"
    correct: "difícil"
  - ascii: "familia"
    correct: "família"
  - ascii: "historia"
    correct: "história"
  - ascii: "musica"
    correct: "música"
  - ascii: "numero"
    correct: "número"
  - ascii: "pagina"
    correct: "página"
  - ascii: "pais"
    correct: "país"
  - ascii: "possivel"
    correct: "possível"
  - ascii: "rapido"
    correct: "rápido"
  - ascii: "saude"
    correct: "saúde"
  - ascii: "unico"
    correct: "único"
  - ascii: "util"
    correct: "útil"

loan_word_whitelist:
  - "area"
  - "data"
  - "extra"
  - "final"
  - "formula"
  - "general"
  - "media"
  - "metal"
  - "normal"
  - "opera"
  - "piano"
  - "radio"
  - "total"
  - "ultra"
  - "via"
